name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: drain-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: drain-linux-aarch64

    # Linux-only: drain reads /proc and /sys/class/power_supply, both
    # are Linux specifics. macOS targets are intentionally absent.

    steps:
      - uses: actions/checkout@v6
        with:
          path: drain

      - name: Checkout crust
        uses: actions/checkout@v6
        with:
          repository: isene/crust
          path: crust

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        working-directory: drain
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        working-directory: drain
        run: |
          cp target/${{ matrix.target }}/release/drain ../${{ matrix.artifact }}
          chmod +x ../${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          generate_release_notes: true
          body: |
            ## Installation

            Download the binary for your platform:
            ```bash
            chmod +x drain-*
            mkdir -p ~/bin && mv drain-linux-x86_64 ~/bin/drain
            ```

            ## Platforms
            - `drain-linux-x86_64` — Linux (Intel/AMD 64-bit)
            - `drain-linux-aarch64` — Linux (ARM 64-bit, Raspberry Pi)

            macOS isn't supported: drain reads `/proc` and
            `/sys/class/power_supply` which are Linux-specific.
